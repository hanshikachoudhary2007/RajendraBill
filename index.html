<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Wire Bill Calculator </title>
<style>
body{font-family:Arial;background:#f5f5f5;padding:15px}
.card{max-width:950px;margin:auto;background:white;padding:20px;border-radius:12px}
table{width:100%;border-collapse:collapse}
th,td{border:1px solid #ddd;padding:8px;text-align:center}
select,input{width:100%;padding:8px;box-sizing:border-box}
button{padding:12px 16px;font-size:16px;margin:5px;cursor:pointer}
.result{margin-top:20px;font-size:18px;line-height:1.8}
</style>
</head>
<body>
<div class="card">
<h2>Wire Bill Calculator</h2>

<label><b>Company</b></label>
<select id="company" onchange="refreshRows()"></select>

<table id="tbl">
<thead>
<tr>
<th>Size</th>
<th>Qty</th>
<th>Rate</th>
<th>Amount</th>
<th>Remove</th>
</tr>
</thead>
<tbody></tbody>
</table>

<div>
<button onclick="addRow()">+ Add Item</button>
<button onclick="calculate()">Calculate</button>
<button onclick="clearAll()">Clear</button>
</div>

<label><b>Less %</b></label>
<input type="number" id="less" value="0">

<div class="result" id="result"></div>
</div>

<script>
const products={
"HAVELLS":{"0.75mm":2275,"1mm":3090,"1.5mm":4530,"2.5mm":7190,"4mm":10540,"6mm":15685,"10mm":32690,"16mm":51520},
"POLYCAB":{"0.75mm":2220,"1mm":2980,"1.5mm":4355,"2.5mm":6880,"4mm":10070,"6mm":15050,"10mm":36500,"16mm":57400},
"RR":{"0.75mm":2150,"1mm":2799,"1.5mm":4049,"2.5mm":6476,"4mm":10154,"6mm":15165},
"KEI":{"0.75mm":2380,"1mm":3060,"1.5mm":4570,"2.5mm":7300,"4mm":10840,"6mm":16410},
"REO":{"0.75mm":2060,"1mm":2665,"1.5mm":3855,"2.5mm":6205,"4mm":9475,"6mm":14225,"10mm":22050,"16mm":34990},
"POLYCAB GREEN":{"0.75mm":2370,"1mm":3195,"1.5mm":4660,"2.5mm":7315,"4mm":10670,"6mm":16015},
"ETIRA":{"0.75mm":2060,"1mm":2670,"1.5mm":3935,"2.5mm":6280,"4mm":9390,"6mm":14435},
"HAVELLS (180M)":{"0.75mm":5010,"1mm":6480,"1.5mm":9490,"2.5mm":15275,"4mm":23590,"6mm":35325},
"RR (200M)":{"0.75mm":5579,"1mm":7287,"1.5mm":10539,"2.5mm":17156,"4mm":26378,"6mm":39225},
"POLYCAB (300M)":{"0.75mm":9230,"1mm":11935,"1.5mm":17490,"2.5mm":29030,"4mm":39960,"6mm":44855,"10mm":77185,"16mm":121435}
};

function populate(sel){
 const c=document.getElementById('company').value;
 sel.innerHTML='';
 Object.keys(products[c]).forEach(s=>{
  let o=document.createElement('option');
  o.value=s;o.text=s;
  sel.appendChild(o);
 });
}

function addRow(){
 let tr=document.createElement('tr');
 tr.innerHTML=`<td><select class="size"></select></td>
 <td><input type="number" class="qty" value="1" min="1"></td>
 <td class="rate"></td>
 <td class="amt"></td>
 <td><button onclick="this.closest('tr').remove()">X</button></td>`;
 document.querySelector('#tbl tbody').appendChild(tr);
 populate(tr.querySelector('.size'));
}

function refreshRows(){
 document.querySelectorAll('.size').forEach(populate);
}

function calculate(){
 const c=document.getElementById('company').value;
 let subtotal=0, count=0;
 document.querySelectorAll('#tbl tbody tr').forEach(r=>{
   let s=r.querySelector('.size').value;
   let q=Number(r.querySelector('.qty').value)||0;
   let rate=products[c][s]||0;
   let amt=rate*q;
   r.querySelector('.rate').innerText='₹'+rate.toLocaleString();
   r.querySelector('.amt').innerText='₹'+amt.toLocaleString();
   subtotal+=amt;
   count+=q;
 });
 let less=Number(document.getElementById('less').value)||0;
 let disc=subtotal*less/100;
 let finalAmt=subtotal-disc;

 document.getElementById('result').innerHTML=
 `<b>Total Quantity:</b> ${count}<br>
 <b>Subtotal:</b> ₹${subtotal.toLocaleString()}<br>
 <b>Discount:</b> ₹${disc.toLocaleString()}<br>
 <b>Final Amount:</b> ₹${finalAmt.toLocaleString()}`;
}

function clearAll(){
 document.querySelector('#tbl tbody').innerHTML='';
 document.getElementById('less').value=0;
 addRow();
 document.getElementById('result').innerHTML='';
}

window.onload=()=>{
 let c=document.getElementById('company');
 Object.keys(products).forEach(x=>{
  let o=document.createElement('option');
  o.value=x;o.text=x;
  c.appendChild(o);
 });
 addRow();
};
</script>
</body>
</html>
